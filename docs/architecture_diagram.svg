<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="500">enterprise-doc-agent — system architecture</text>

<!-- USER LAYER -->
<rect x="220" y="50" width="240" height="44" rx="8" fill="#042C53" stroke="#85B7EB" stroke-width="0.5"/>
<text x="340" y="65" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4" font-size="14" font-weight="500">Streamlit UI</text>
<text x="340" y="81" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">Upload docs, ask questions</text>

<line x1="340" y1="94" x2="340" y2="120" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- INPUT GUARDRAILS -->
<rect x="220" y="120" width="240" height="40" rx="8" fill="#501313" stroke="#F09595" stroke-width="0.5"/>
<text x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="#F7C1C1" font-size="14" font-weight="500">Input guardrails</text>
<text x="480" y="140" text-anchor="start" fill="#999" font-size="12">Prompt injection, file validation</text>

<line x1="280" y1="160" x2="280" y2="190" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="400" y1="160" x2="400" y2="190" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
<text x="265" y="180" text-anchor="middle" fill="#999" font-size="12">file</text>
<text x="415" y="180" text-anchor="middle" fill="#999" font-size="12">query</text>

<!-- INGESTION PIPELINE -->
<rect x="40" y="190" width="200" height="260" rx="14" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="140" y="215" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" font-size="14" font-weight="500">Ingestion pipeline</text>

<rect x="65" y="235" width="150" height="44" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="140" y="250" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" font-size="14" font-weight="500">Loader</text>
<text x="140" y="266" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-size="12">PDF, TXT, CSV, XLSX</text>

<line x1="140" y1="279" x2="140" y2="305" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="65" y="305" width="150" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="140" y="325" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" font-size="14" font-weight="500">Row-to-prose</text>
<text x="17" y="325" text-anchor="start" fill="#999" font-size="12">CSV/XLSX</text>

<line x1="140" y1="345" x2="140" y2="375" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="65" y="375" width="150" height="44" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="140" y="390" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" font-size="14" font-weight="500">Chunker</text>
<text x="140" y="406" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-size="12">1000 chars, 200 overlap</text>

<line x1="215" y1="397" x2="550" y2="397" stroke="#666" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="550" y1="397" x2="550" y2="460" stroke="#666" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="380" y="390" text-anchor="middle" fill="#999" font-size="12">embed + store</text>

<!-- VECTOR STORE -->
<rect x="475" y="460" width="165" height="56" rx="8" fill="#173404" stroke="#97C459" stroke-width="0.5"/>
<text x="557" y="480" text-anchor="middle" dominant-baseline="central" fill="#C0DD97" font-size="14" font-weight="500">ChromaDB</text>
<text x="557" y="498" text-anchor="middle" dominant-baseline="central" fill="#97C459" font-size="12">OpenAI embeddings</text>

<!-- AGENT GRAPH -->
<rect x="180" y="190" width="310" height="400" rx="16" fill="#26215C" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="335" y="215" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-size="14" font-weight="500">LangGraph agent</text>

<!-- Retrieve -->
<rect x="270" y="235" width="130" height="40" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="335" y="255" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-size="14" font-weight="500">Retrieve</text>

<line x1="400" y1="255" x2="473" y2="470" stroke="#666" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="335" y1="275" x2="335" y2="305" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Grade -->
<rect x="270" y="305" width="130" height="40" rx="8" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
<text x="335" y="325" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="14" font-weight="500">Grade</text>

<text x="420" y="360" text-anchor="start" fill="#999" font-size="12">relevant?</text>
<line x1="335" y1="345" x2="335" y2="380" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
<text x="345" y="368" text-anchor="start" fill="#97C459" font-size="12">yes</text>

<line x1="270" y1="325" x2="215" y2="325" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
<text x="238" y="318" text-anchor="middle" fill="#F09595" font-size="12">no</text>

<!-- Reformulate -->
<rect x="195" y="235" width="60" height="110" rx="8" fill="#4A1B0C" stroke="#F0997B" stroke-width="0.5"/>
<text x="225" y="290" text-anchor="middle" dominant-baseline="central" fill="#F5C4B3" font-size="12" font-weight="500" transform="rotate(-90 225 290)">Reformulate</text>

<path d="M225 235 L225 225 L335 225 L335 235" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Generate -->
<rect x="270" y="380" width="130" height="40" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="335" y="400" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-size="14" font-weight="500">Generate</text>

<line x1="335" y1="420" x2="335" y2="450" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Validate -->
<rect x="270" y="450" width="130" height="40" rx="8" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
<text x="335" y="470" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="14" font-weight="500">Validate</text>

<text x="420" y="485" text-anchor="start" fill="#999" font-size="12">grounded?</text>
<line x1="335" y1="490" x2="335" y2="530" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
<text x="345" y="520" text-anchor="start" fill="#97C459" font-size="12">yes</text>

<path d="M270 470 L250 470 L250 400 L270 400" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
<text x="240" y="440" text-anchor="end" fill="#F09595" font-size="12">no</text>

<line x1="335" y1="530" x2="335" y2="560" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Pydantic label -->
<rect x="420" y="305" width="55" height="80" rx="6" fill="#2C2C2A" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="448" y="340" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7" font-size="12" font-weight="500" transform="rotate(-90 448 340)">Pydantic</text>

<!-- GENERATION -->
<rect x="200" y="610" width="160" height="44" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="280" y="625" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-size="14" font-weight="500">Generator</text>
<text x="280" y="641" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-size="12">GPT-4o-mini + prompt</text>

<line x1="340" y1="590" x2="340" y2="610" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- OUTPUT GUARDRAILS -->
<rect x="200" y="680" width="280" height="40" rx="8" fill="#501313" stroke="#F09595" stroke-width="0.5"/>
<text x="340" y="700" text-anchor="middle" dominant-baseline="central" fill="#F7C1C1" font-size="14" font-weight="500">Output guardrails</text>
<text x="500" y="700" text-anchor="start" fill="#999" font-size="12">PII, leakage, API keys</text>

<line x1="340" y1="654" x2="340" y2="680" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="720" x2="340" y2="750" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- FINAL ANSWER -->
<rect x="220" y="750" width="240" height="44" rx="8" fill="#042C53" stroke="#85B7EB" stroke-width="0.5"/>
<text x="340" y="765" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4" font-size="14" font-weight="500">Final answer</text>
<text x="340" y="781" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">With citations + agent trace</text>

<!-- Config -->
<rect x="40" y="480" width="110" height="40" rx="8" fill="#2C2C2A" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="95" y="500" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7" font-size="14" font-weight="500">config.py</text>
<text x="95" y="535" text-anchor="middle" fill="#999" font-size="12">.env → all modules</text>

<!-- Docker -->
<rect x="40" y="620" width="110" height="44" rx="8" fill="#2C2C2A" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="95" y="636" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7" font-size="14" font-weight="500">Docker</text>
<text x="95" y="652" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9" font-size="12">Containerised</text>

</svg>